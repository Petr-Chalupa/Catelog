name: Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  build-args: |
                      NUXT_BETTER_AUTH_SECRET=${{ secrets.NUXT_BETTER_AUTH_SECRET }}
                      NUXT_PUBLIC_BETTER_AUTH_BASE_URL=${{ secrets.NUXT_PUBLIC_BETTER_AUTH_BASE_URL }}
                      NUXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NUXT_PUBLIC_VAPID_PUBLIC_KEY }}
                      NUXT_PUBLIC_ENV=production
                  platforms: linux/arm64
                  tags: ghcr.io/petr-chalupa/catelog:latest
